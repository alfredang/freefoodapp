name: iOS release

# On every push to main that touches the app, build + sign the app, upload a new
# build to App Store Connect, and auto-submit it for review. Version handling:
#   - if the latest App Store version is still editable / in review, that version is
#     reused (its review is cancelled and the new build resubmitted);
#   - if the latest version is already released, the next version is created and the
#     previous version's metadata + screenshots are carried over automatically.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/**"
      - "scripts/**"
      - "ci/screenshots/**"
  workflow_dispatch:

concurrency:
  group: ios-release
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-15
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_API_PRIVATE_KEY: ${{ secrets.ASC_API_PRIVATE_KEY }}
      ASC_BUNDLE_ID: com.tertiaryinfotech.freefood
      TEAM_ID: GU9WTSTX9M
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip3 install --quiet cryptography

      - name: Import signing certificate & provisioning profile
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERT="$RUNNER_TEMP/dist.p12"
          PROFILE="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN="$RUNNER_TEMP/app.keychain-db"
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > "$CERT"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import "$CERT" -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/FreeFood_App_Store.mobileprovision"

      - name: Determine version & build number
        id: ver
        run: |
          VER=$(python3 scripts/ci_submit.py next-version)
          BUILD=$(date -u +%y%m%d%H%M)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VER build $BUILD"

      - name: Archive
        run: |
          xcodebuild -project freefoodapp.xcodeproj -scheme freefoodapp -configuration Release \
            -archivePath "$RUNNER_TEMP/FreeFood.xcarchive" \
            CODE_SIGN_STYLE=Manual "CODE_SIGN_IDENTITY=Apple Distribution" \
            "PROVISIONING_PROFILE_SPECIFIER=FreeFood App Store" DEVELOPMENT_TEAM=$TEAM_ID \
            MARKETING_VERSION=${{ steps.ver.outputs.version }} \
            CURRENT_PROJECT_VERSION=${{ steps.ver.outputs.build }} \
            clean archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/FreeFood.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" -exportOptionsPlist ExportOptions.plist

      - name: Upload to App Store Connect
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_API_PRIVATE_KEY" > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          xcrun altool --upload-app -f "$RUNNER_TEMP/export/FreeFood.ipa" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      - name: Wait for processing
        run: python3 scripts/ci_submit.py wait-build --build ${{ steps.ver.outputs.build }}

      - name: Attach build & submit for review
        run: python3 scripts/ci_submit.py submit --version ${{ steps.ver.outputs.version }} --build ${{ steps.ver.outputs.build }}
